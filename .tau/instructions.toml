[common]
instructions = """
 - No unwrap() in non-test code (use expect() instead)
 - Prefer the `read` tool for reading individual files. Do NOT spawn child sessions just to read files — use `read` directly. Only spawn child sessions when you need parallel work across many files or when the child needs to do reasoning/analysis beyond simple reading.
 - When you do spawn child sessions purely for code summarization (no reasoning or decision-making required), pass `model: "light"` to session_spawn. Do NOT use "light" for sessions that need to review code, make judgments, write code, plan, or reason — those need the full model.
"""

[worker]
instruction = """
  - Keep the diff focused on the task; no unrelated refactors or drive-by fixes
  - Prefer small commits with conventional-commit style messages
  - A git hook will `cargo fmt` your changes at commit time.
  - Run the project checklist (`just`) ONCE before marking for review — capture output to a file if you need both exit code and tail
 - If you discover a separate bug, cleanup or optimization opportunity while working, file a new task instead of expanding scope
 """

[planning]
instructions = """
 - Prefer the `read` tool for reading files directly. Only spawn sub-sessions when you need parallel analysis across many files.
 - When you do spawn sub-sessions purely to summarize source files, pass `model: "light"` to session_spawn. Do NOT use "light" for review or analysis sessions that need to make judgments.
"""

[refining]
instructions = """
 - Watch out for race conditions with DB accesses - use transactions if they help
"""

[review]
instructions = """
 - Ensure no unrelated changes are included
 - Be strict, don't allow minor issues
"""
